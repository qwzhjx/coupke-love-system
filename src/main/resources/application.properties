# ==================== 服务端口 ====================
server.port=8080
server.servlet.context-path=/

# ==================== 数据库配置 ====================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/couple_love?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus.mapper-locations=classpath:mappers/*.xml
mybatis-plus.type-aliases-package=com.love.couplelovesystem.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ==================== Thymeleaf 配置 ====================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.servlet.content-type=text/html

# ==================== 文件上传配置 ====================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
file.upload.path=D:/couple-love/couple-love-system/upload
file.upload.photos=D:/couple-love/couple-love-system/upload/photos
file.upload.voices=D:/couple-love/couple-love-system/upload/voices
file.upload.materials=D:/couple-love/couple-love-system/upload/materials

# ==================== JWT 配置 ====================
jwt.secret=coupleLoveSystemSecretKey2026
jwt.expiration=86400000

# ==================== 日志配置 ====================
logging.level.com.love.couplelovesystem=DEBUG
logging.level.org.springframework=WARN
