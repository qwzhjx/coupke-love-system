# ==================== 服务端口 ====================
server.port=${PORT:8080}
server.servlet.context-path=/

# ==================== H2 数据库（免费部署用） ====================
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/couple_love;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus.mapper-locations=classpath:mappers/*.xml
mybatis-plus.type-aliases-package=com.love.couplelovesystem.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ==================== Thymeleaf ====================
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==================== 文件上传 ====================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
file.upload.path=/app/upload
file.upload.photos=/app/upload/photos
file.upload.voices=/app/upload/voices
file.upload.materials=/app/upload/materials

# ==================== JWT ====================
jwt.secret=coupleLoveSystemSecretKey2026
jwt.expiration=86400000

# ==================== 日志 ====================
logging.level.com.love.couplelovesystem=INFO
logging.level.org.springframework=WARN