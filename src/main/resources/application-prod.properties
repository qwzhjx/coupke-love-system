# ==================== 服务端口 ====================
server.port=${PORT:8080}
server.servlet.context-path=/

# ==================== MySQL 数据库（TiDB Cloud 免费版） ====================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:4000}/${DB_NAME:test}?useSSL=true&requireSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus.mapper-locations=classpath:mappers/*.xml
mybatis-plus.type-aliases-package=com.love.couplelovesystem.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

# ==================== Thymeleaf ====================
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ==================== 文件上传 ====================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
file.upload.path=/app/upload
file.upload.photos=/app/upload/photos
file.upload.voices=/app/upload/voices
file.upload.materials=/app/upload/materials

# ==================== JWT ====================
jwt.secret=coupleLoveSystemSecretKey2026
jwt.expiration=86400000

# ==================== 日志 ====================
logging.level.com.love.couplelovesystem=INFO
logging.level.org.springframework=WARN
