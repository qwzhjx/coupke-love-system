<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>后台登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#FFF0F5,#EDE4F3);display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}
.box{background:#fff;border-radius:24px;padding:40px 30px;width:90%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
h2{color:#FF69B4;margin-bottom:8px}
p{color:#A899A8;font-size:13px;margin-bottom:24px}
input{width:100%;padding:14px;border:2px solid rgba(248,165,194,0.3);border-radius:25px;font-size:15px;text-align:center;outline:none;margin-bottom:12px}
input:focus{border-color:#F8A5C2}
button{width:100%;padding:14px;border:none;border-radius:25px;background:linear-gradient(135deg,#F8A5C2,#FF69B4);color:#fff;font-size:16px;cursor:pointer}
button:active{transform:scale(.95)}
.msg{color:#f44336;font-size:13px;margin-top:10px}
</style>
</head>
<body>
<div class="box">
  <div style="font-size:48px">🔐</div>
  <h2>后台管理</h2>
  <p>输入账号密码登录</p>
  <input id="u" placeholder="用户名" value="admin">
  <input id="p" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <div class="msg" id="msg"></div>
</div>
<script>
function login(){
  var u=document.getElementById('u').value.trim();
  var p=document.getElementById('p').value.trim();
  var m=document.getElementById('msg');
  if(!u||!p){m.textContent='请输入账号和密码';return;}
  m.textContent='登录中...';m.style.color='#A899A8';
  fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
  .then(function(r){return r.json()})
  .then(function(r){
    if(r.code===200){localStorage.setItem('atoken',r.data);location.href='/admin/dashboard';}
    else{m.textContent=r.msg||'登录失败';m.style.color='#f44336';}
  }).catch(function(e){m.textContent='网络错误';m.style.color='#f44336';});
}
</script>
</body>
</html>
