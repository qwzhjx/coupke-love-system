<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>情绪急救 💊</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .scene-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .scene-tab {
      flex: 1; text-align: center; padding: 10px 8px;
      border-radius: 20px; font-size: 13px;
      background: white; border: 2px solid rgba(248,165,194,0.3);
      cursor: pointer; transition: all 0.3s;
    }
    .scene-tab.active {
      background: linear-gradient(135deg, #F8A5C2, #FF69B4);
      color: white; border-color: transparent;
    }
    .comfort-card {
      background: white; border-radius: 20px; padding: 24px 20px;
      text-align: center; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(255,182,193,0.2);
    }
    .comfort-text {
      font-size: 16px; line-height: 2; color: #6B5B6B;
      padding: 16px; min-height: 80px;
      background: linear-gradient(135deg, #FF69B4, #9C27B0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 600;
    }
    .progress-section {
      background: white; border-radius: 20px; padding: 20px;
      margin-bottom: 16px; box-shadow: 0 2px 12px rgba(255,182,193,0.2);
    }
    .story-card {
      background: white; border-radius: 20px; padding: 20px;
      margin-bottom: 12px; cursor: pointer;
      border: 1px solid rgba(248,165,194,0.3); transition: all 0.3s;
    }
    .story-card:active { transform: scale(0.98); }
    .story-card .story-title { font-size: 15px; font-weight: 600; color: #FF69B4; }
    .story-card .story-preview { font-size: 13px; color: #A899A8; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
<div class="top-bar" id="topSlogan">🎀 Hello Kitty · 专属宠爱只属于你 🎀</div>

<div class="main-container">

  <!-- 场景切换 -->
  <div class="scene-tabs">
    <div class="scene-tab active" onclick="switchScene(1, this)">😤 轻微生气</div>
    <div class="scene-tab" onclick="switchScene(2, this)">🤬 超级生气</div>
    <div class="scene-tab" onclick="switchScene(3, this)">😢 委屈难过</div>
  </div>

  <!-- 哄宠话术卡片 -->
  <div class="comfort-card" id="comfortCard">
    <div style="font-size:36px;margin-bottom:8px;">💌</div>
    <div class="comfort-text" id="comfortText">点击下方按钮<br>让宝宝哄哄你吧 💗</div>
	    <div id="comfortVideo" style="display:none;margin-top:10px;"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:12px;">
      <button class="btn btn-primary" onclick="getComfortWord()">💗 哄我开心</button>
      <button class="btn btn-outline btn-sm" onclick="getComfortWord()">🔄 换一句</button>
    </div>
  </div>

  <!-- 消气进度条 -->
  <div class="progress-section">
    <div style="font-size:14px;font-weight:600;color:#6B5B6B;margin-bottom:8px;">💢 消消气进度</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0% — 快到100%解锁超级福利哦~</div>
    <button class="btn btn-outline btn-sm" style="margin-top:10px;" onclick="resetProgress()">💚 我已经不生气了</button>
  </div>

  <!-- 认错保证书 -->
  <div class="card" style="cursor:pointer;" onclick="openApology()">
    <div class="card-title">📜 专属认错保证书</div>
    <div style="font-size:13px;color:#A899A8;">点击查看宝宝的认错保证书 →</div>
  </div>

  <!-- 睡前故事 -->
  <div class="card">
    <div class="card-title">🌙 专属睡前小故事</div>
    <div id="storyList" style="max-height:300px;overflow-y:auto;">
      <div style="text-align:center;padding:12px;color:#A899A8;">加载中...</div>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="randomStory()">🎲 随机换一篇</button>
    <button class="btn btn-outline btn-block btn-sm" style="margin-top:8px;" id="ttsBtn" onclick="toggleTTS()">🔊 语音朗读</button>
  </div>

</div>

<div class="bottom-nav">
  <a href="/home"><span class="icon">🏠</span>首页</a>
  <a href="/comfort" class="active"><span class="icon">💊</span>情绪急救</a>
  <a href="/interaction"><span class="icon">💞</span>互动</a>
  <a href="/memory"><span class="icon">📸</span>记录</a>
  <a href="/privilege"><span class="icon">👑</span>特权</a>
</div>

<!-- 保证书弹窗 -->
<div class="modal-overlay" id="apologyModal" style="display:none;" onclick="if(event.target.id==='apologyModal')this.style.display='none'">
  <div class="modal-box" style="max-width:90%;">
    <div style="font-size:18px;font-weight:700;color:#FF69B4;margin-bottom:16px;">📜 专属认错保证书</div>
    <div class="letter-paper" id="apologyContent" style="max-height:300px;overflow-y:auto;">加载中...</div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-primary" style="flex:1;" onclick="forgive()">💚 原谅他</button>
      <button class="btn btn-outline" style="flex:1;" onclick="punish()">📝 再罚一次</button>
    </div>
  </div>
</div>

<!-- 故事详情弹窗 -->
<div class="modal-overlay" id="storyModal" style="display:none;" onclick="if(event.target.id==='storyModal')this.style.display='none'">
  <div class="modal-box" style="max-width:90%;">
    <div style="font-size:18px;font-weight:700;color:#FF69B4;margin-bottom:8px;" id="storyModalTitle"></div>
    <div style="max-height:350px;overflow-y:auto;line-height:2;font-size:14px;text-align:left;padding:8px;" id="storyModalContent"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="toggleTTS()">🔊 朗读</button>
  </div>
</div>

<script src="/js/api.js?v=2"></script>
<script>
let currentScene = 1;
let currentStoryContent = '';
let isSpeaking = false;

function init() {
  if (!getPassword()) { location.href = '/'; return; }
  loadSlogan();
  loadProgress();
  loadStories();
}

function loadSlogan() {
  API.get('/system/config/public').then(function(r) {
    if (r.code === 200 && r.data.slogan) {
      document.getElementById('topSlogan').textContent = r.data.slogan;
    }
  });
}

async function switchScene(scene, el) {
  currentScene = scene;
  document.querySelectorAll('.scene-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function getComfortWord() {
  try {
    const res = await API.get('/comfort/word/random', { category: currentScene });
    if (res.code === 200 && res.data) {
      document.getElementById("comfortText").textContent = res.data.content;
      var vc = document.getElementById("comfortVideo");
      if (res.data.voiceUrl) {
        vc.style.display = "block";
        vc.innerHTML = '<audio src="' + res.data.voiceUrl + '" controls preload="auto" style="width:100%;"></audio>';
      } else {
        vc.style.display = "none";
      }
      showHearts(8);
      loadProgress();
    } else {
      document.getElementById("comfortText").textContent = res.msg || "宝宝正在马不停蹄地为你准备专属情话～";
      document.getElementById("comfortVideo").style.display = "none";
    }
  } catch(e) { showToast('网络开小差了~'); }
}

async function loadProgress() {
  try {
    const res = await API.get('/comfort/anger-progress');
    if (res.code === 200) {
      const p = res.data.progress;
      document.getElementById('progressFill').style.width = p + '%';
      document.getElementById('progressText').textContent = p + '% — ' + (p >= 100 ? '🎉 解锁超级福利！' : '快到100%解锁超级福利哦~');
      if (p >= 100) showHearts(20);
    }
  } catch(e) {}
}

async function resetProgress() {
  await API.post('/comfort/anger-progress/reset');
  loadProgress();
  showToast('进度已重置，希望你每天开心 💗');
}

async function openApology() {
  document.getElementById('apologyModal').style.display = 'flex';
  try {
    const res = await API.get('/comfort/apology-letter');
    if (res.code === 200 && res.data) {
      var html = '';
      if (res.data.voiceUrl) {
        html = '<audio src="' + res.data.voiceUrl + '" controls preload="auto" style="width:100%;margin-bottom:12px;"></audio><hr style="border:none;border-top:1px dashed rgba(248,165,194,0.3);margin:12px 0;">';
      }
      html += '<b>' + res.data.title + '</b><br><br>' + res.data.content.replace(/\n/g, '<br>');
      document.getElementById('apologyContent').innerHTML = html;
    } else {
      document.getElementById('apologyContent').textContent = '宝宝正在认真写保证书，请稍候...';
    }
  } catch(e) { document.getElementById('apologyContent').textContent = '加载失败~'; }
}

async function forgive() {
  await API.post('/comfort/apology/forgive');
  document.getElementById('apologyModal').style.display = 'none';
  showHearts(15);
  showToast('已原谅 💚 希望他好好表现~');
  loadProgress();
}

async function punish() {
  await API.post('/comfort/apology/punish');
  document.getElementById('apologyModal').style.display = 'none';
  showToast('已记录，需要更多补偿 💪');
}

function loadStories() {
  API.get('/comfort/story/list', { page: 1, size: 100 }).then(function(res) {
    var container = document.getElementById('storyList');
    if (res.code === 200 && res.data.records && res.data.records.length > 0) {
      container.innerHTML = res.data.records.map(function(s) {
        var hasVoice = s.voiceUrl ? ' 🎙️' : '';
        return '<div class="story-card" onclick="openStory(\'' + s.id + '\',\'' + s.title.replace(/'/g,'') + '\',\'' + (s.voiceUrl||'') + '\')"><div class="story-title">' + s.title + hasVoice + '</div><div class="story-preview">' + s.content.substring(0,40) + '...</div></div>';
      }).join('');
    } else {
      container.innerHTML = '<div style="text-align:center;padding:12px;color:#A899A8;">暂无故事，宝宝正在创作中~</div>';
    }
  }).catch(function(){});
}

function randomStory() {
  API.get('/comfort/story/random').then(function(res) {
    if (res.code === 200 && res.data) {
      openStoryModal(res.data.title, res.data.content, res.data.voiceUrl);
    }
  }).catch(function(){});
}

function openStory(id, title, voiceUrl) {
  API.get('/comfort/story/' + id).then(function(res) {
    if (res.code === 200) openStoryModal(res.data.title, res.data.content, res.data.voiceUrl || voiceUrl);
  });
}

function openStoryModal(title, content, voiceUrl) {
  document.getElementById('storyModalTitle').textContent = title;
  var contentEl = document.getElementById('storyModalContent');
  contentEl.innerHTML = '';
  // 如果有录音，显示音频播放器
  if (voiceUrl) {
    contentEl.innerHTML = '<audio src="' + voiceUrl + '" controls preload="auto" style="width:100%;margin-bottom:12px;"></audio><hr style="border:none;border-top:1px dashed rgba(248,165,194,0.3);margin:12px 0;">';
  }
  contentEl.innerHTML += content.replace(/\n/g, '<br>');
  document.getElementById('storyModal').style.display = 'flex';
  currentStoryContent = content;
}

function toggleTTS() {
  if (!window.speechSynthesis) { showToast('浏览器不支持语音朗读~'); return; }
  if (isSpeaking) {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    document.getElementById('ttsBtn').textContent = '🔊 语音朗读';
    return;
  }
  const text = currentStoryContent || document.getElementById('storyModalContent').textContent;
  if (!text) { showToast('请先打开一篇故事~'); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.1;
  u.onend = () => { isSpeaking = false; document.getElementById('ttsBtn').textContent = '🔊 语音朗读'; };
  window.speechSynthesis.speak(u);
  isSpeaking = true;
  document.getElementById('ttsBtn').textContent = '⏹ 停止朗读';
}

init();
</script>
</body>
</html>
