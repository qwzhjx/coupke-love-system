<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>专属空间 💕</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; background: #FFF0F5; }
    .lock-container { text-align: center; padding: 40px 30px; width: 100%; max-width: 380px; }
    .lock-icon { font-size: 72px; animation: heartbeat 2s ease-in-out infinite; }
    .lock-title { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #FF69B4, #9C27B0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 16px 0 8px; }
    .lock-sub { font-size: 13px; color: #A899A8; margin-bottom: 28px; }
    .lock-input { width: 100%; padding: 14px 20px; border: 2px solid rgba(248,165,194,0.3); border-radius: 30px; font-size: 18px; text-align: center; letter-spacing: 6px; outline: none; background: #FFF; transition: border-color 0.3s; }
    .lock-input:focus { border-color: #F8A5C2; }
    .lock-btn { width: 100%; margin-top: 20px; padding: 14px; border-radius: 30px; background: linear-gradient(135deg, #F8A5C2, #FF69B4); color: white; font-size: 16px; border: none; cursor: pointer; transition: all 0.3s; }
    .lock-btn:active { transform: scale(0.95); }
    .lock-hint { font-size: 12px; color: #ccc; margin-top: 16px; }
    .url-box { margin-top: 20px; padding: 12px; background: white; border-radius: 12px; border: 1px solid rgba(248,165,194,0.3); font-size: 12px; color: #A899A8; line-height: 1.8; }
    .url-box b { color: #FF69B4; }
  </style>
</head>
<body>
<div class="lock-container">
  <div class="lock-icon">🎀</div>
  <div class="lock-title" th:text="${slogan} ?: '🎀 Hello Kitty · 专属宠爱只属于你 🎀'">🎀 Hello Kitty · 专属宠爱只属于你 🎀</div>
  <div class="lock-sub">输入专属密码，进入我们的甜蜜世界</div>
  <input type="password" id="pwdInput" class="lock-input" placeholder="🔐 输入密码" maxlength="16"
         onkeyup="if(event.key==='Enter')verifyPwd()">
  <button class="lock-btn" onclick="verifyPwd()">💗 进入专属空间</button>
  <div class="lock-hint">只有知道密码的人才能进入哦~</div>

  <!-- 扫码 + 网址 -->
  <div style="margin-top:24px;text-align:center;">
    <div style="font-size:12px;color:#ccc;margin-bottom:8px;">📱 手机扫码直接访问</div>
    <img id="qrcode" src="" alt="扫码访问" style="width:150px;height:150px;border-radius:12px;border:2px solid rgba(248,165,194,0.3);" onerror="this.style.display='none'">
  </div>
  <div class="url-box" id="urlBox">
    💻 电脑：<b>http://localhost:8080</b><br>
    📱 手机：<b id="lanUrl">获取中...</b>
  </div>
</div>

<script src="/js/api.js?v=2"></script>
<script>
(function() {
  var lanEl = document.getElementById('lanUrl');
  var origin = window.location.origin;
  var port = window.location.port ? ':' + window.location.port : '';

  // 尝试通过 WebRTC 获取真实局域网 IP
  function getLanIP() {
    return new Promise(function(resolve) {
      var pc = new RTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('');
      pc.createOffer().then(function(offer) { return pc.setLocalDescription(offer); });
      pc.onicecandidate = function(e) {
        if (!e.candidate) { pc.close(); return; }
        var ip = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
        if (ip && !ip[1].startsWith('169.254') && !ip[1].startsWith('0.')) {
          pc.close();
          resolve(ip[1]);
        }
      };
      setTimeout(function() { pc.close(); resolve(null); }, 3000);
    });
  }

  // 如果非 localhost 访问，直接用当前域名
  if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
    lanEl.innerHTML = '<b>' + origin + '/</b>';
    document.getElementById('qrcode').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(origin + '/');
  } else {
    // localhost 本地访问时，自动探测局域网 IP
    getLanIP().then(function(ip) {
      if (ip) {
        var lanOrigin = 'http://' + ip + port;
        lanEl.innerHTML = '<b>' + lanOrigin + '/</b> <span style="font-size:10px;color:#ccc">（同一WiFi下用这个）</span>';
        document.getElementById('qrcode').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(lanOrigin + '/');
      } else {
        lanEl.textContent = origin + '（同WiFi用此IP）';
      }
    });
  }
})();

async function verifyPwd() {
  var pwd = document.getElementById('pwdInput').value.trim();
  if (!pwd) { showToast('请输入密码哦~'); return; }
  try {
    var res = await API.post('/system/verify-password', { password: pwd });
    if (res.code === 200) {
      setPassword(pwd);
      showHearts(20);
      setTimeout(function() { location.href = '/home'; }, 600);
    } else {
      showToast(res.msg || '密码不对哦，再想想~');
    }
  } catch(e) {
    showToast('网络开小差了，再试试~');
  }
}
</script>
</body>
</html>
